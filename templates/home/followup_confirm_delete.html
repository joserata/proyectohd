{% extends 'base.html' %}

{% block title %}Eliminar seguimiento{% endblock %}

{% block content %}
<div class="card">
    <h2>Eliminar seguimiento</h2>
    <p>¿Seguro que deseas eliminar este seguimiento?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Sí, eliminar</button>
        <a class="btn btn-secondary" href="{% url 'followup_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
