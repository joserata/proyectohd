{% extends 'base.html' %}

{% block title %}Tarea{% endblock %}

{% block content %}
<div class="card">
    <h2>{% if form.instance.pk %}Editar tarea{% else %}Nueva tarea{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Guardar</button>
        <a class="btn btn-secondary" href="{% url 'task_list' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
